<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>FairSlice — Result Mockup</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0f0f1a;--card:#1a1a2e;--card2:#22223a;--border:#2e2e50;--text:#e8e8f0;--muted:#7878aa;--radius:14px}
    html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh}
    header{padding:18px 20px 14px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
    header h1{font-size:1.3rem;font-weight:700} header p{font-size:.8rem;color:var(--muted)}
    .tag{margin-left:auto;padding:6px 12px;font-size:.75rem;background:rgba(233,69,96,.2);border:1px solid rgba(233,69,96,.4);border-radius:6px;color:#e94560;font-weight:700}
    main{max-width:640px;margin:0 auto;padding:20px 16px 40px}
    .img-wrap{border-radius:var(--radius);overflow:hidden;margin-bottom:14px;box-shadow:0 0 40px rgba(0,245,255,.15)}
    .img-wrap img{width:100%;display:block}
    .fhero{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:12px;position:relative;overflow:hidden}
    .fhero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,245,255,.04),rgba(255,0,228,.04));pointer-events:none}
    .ftop{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .flabel{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted)}
    .fnum{font-size:2.4rem;font-weight:900;letter-spacing:-2px;line-height:1;color:#ffee00;text-shadow:0 0 24px #ffee00}
    .ftrack{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden}
    .ffill{height:100%;border-radius:3px;background:#ffee00;width:87%;box-shadow:0 0 10px #ffee00,0 0 20px #ffee0055}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
    .card{border-radius:12px;padding:14px 12px 12px;border:1px solid transparent}
    .pnum{font-size:2rem;font-weight:900;line-height:1;margin-bottom:12px;text-shadow:0 0 20px currentColor}
    .irow{margin-bottom:8px} .irow:last-child{margin-bottom:0}
    .imeta{display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:3px;color:rgba(255,255,255,.65);font-weight:500}
    .ipct{font-weight:700;color:rgba(255,255,255,.9)}
    .itrack{height:3px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
    .ifill{height:100%;border-radius:2px}
    .brow{display:flex;gap:12px}
    .btn{flex:1;padding:14px;border-radius:10px;border:none;font-size:1rem;font-weight:600;cursor:pointer}
    .bs{background:var(--card2);color:var(--text);border:1px solid var(--border)}
    .ba{background:linear-gradient(135deg,#e94560,#f5a623);color:#fff;box-shadow:0 4px 14px rgba(233,69,96,.4)}
  </style>
</head>
